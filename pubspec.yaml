name: flutter_localisation_cli
description: >-
  Terminal CLI (fl) and MCP server (fl_mcp) for FlutterLocalisation — add, edit,
  delete and AI-translate localization keys from the shell or from Claude, then
  pull the ARBs. Pure Dart; pairs with the flutter_localisation runtime package.
version: 1.2.1
homepage: https://flutterlocalisation.com
repository: https://github.com/tajaouart/flutter_localisation_cli
issue_tracker: https://github.com/tajaouart/flutter_localisation/issues
documentation: https://flutterlocalisation.com

topics:
  - localization
  - internationalization
  - i18n
  - cli
  - mcp

environment:
  sdk: ^3.4.1

dependencies:
  http: ^1.4.0
  args: ^2.4.0

dev_dependencies:
  test: ^1.16.0
  lints: ^6.0.0

executables:
  fl: fl
  fl_mcp: fl_mcp
